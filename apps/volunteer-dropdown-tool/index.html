<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Information Center | Volunteer Quick Reference</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#005f73" />
</head>

<body>
  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">Volunteer Tools</p>
      <h1>Information Center</h1>
      <p>Volunteer Quick Reference</p>
    </header>

    <section class="search-section" aria-label="Search volunteer reference topics">
      <label for="search-input">Search topics</label>
      <input
        id="search-input"
        type="search"
        placeholder="Search restrooms, lost and found, accessibility, emergencies..."
        autocomplete="off"
      />
    </section>

    <section class="selector-section" aria-label="Choose a volunteer topic">
      <label for="section-select">Choose a topic</label>
      <select id="section-select"></select>
    </section>

    <section id="emergency-section" class="emergency-section"></section>

    <section id="content" class="content-section" aria-live="polite"></section>

    <section class="image-note">
      <h2>Suggested Images</h2>
      <div id="image-list"></div>
    </section>

    <footer class="footer">
      Monterey Bay Aquarium · Volunteer Tools
    </footer>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
