<!-- APP IMAGE FILE: apps/five-senses-pwa/images/header-five-senses.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Five senses header illustration</title>
  <desc id="desc">A friendly educational illustration with colorful symbols for sight, hearing, smell, taste, and touch.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e8f6ff"/>
      <stop offset="1" stop-color="#fff1d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#173546" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="860" height="520" rx="54" fill="url(#bg)"/>

  <circle cx="450" cy="280" r="160" fill="#ffffff" filter="url(#shadow)"/>
  <circle cx="450" cy="280" r="124" fill="#eef7f7"/>

  <!-- Sight -->
  <g transform="translate(450 116)">
    <circle r="70" fill="#f6b44b"/>
    <path d="M-42 0 Q0 -34 42 0 Q0 34 -42 0Z" fill="#fff"/>
    <circle cx="0" cy="0" r="18" fill="#315f7d"/>
    <circle cx="6" cy="-6" r="6" fill="#fff"/>
  </g>

  <!-- Hearing -->
  <g transform="translate(610 240)">
    <circle r="70" fill="#4fa7c8"/>
    <path d="M-12 38 C-38 16 -24 -36 10 -38 C42 -40 50 -2 28 18 C14 31 16 43 2 44 C-5 45 -8 43 -12 38Z" fill="#fff"/>
    <path d="M14 -18 C32 -7 32 13 16 26" fill="none" stroke="#315f7d" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Smell -->
  <g transform="translate(548 424)">
    <circle r="70" fill="#64a66f"/>
    <path d="M-26 28 C-20 -12 20 -12 26 28 C14 44 -14 44 -26 28Z" fill="#fff"/>
    <path d="M-26 -12 C-42 -34 -10 -50 -4 -22" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <path d="M26 -12 C42 -34 10 -50 4 -22" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Taste -->
  <g transform="translate(352 424)">
    <circle r="70" fill="#d85c5c"/>
    <path d="M-38 -12 Q0 48 38 -12 C20 0 -20 0 -38 -12Z" fill="#fff"/>
    <path d="M-42 -12 Q0 18 42 -12" fill="none" stroke="#315f7d" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Touch -->
  <g transform="translate(290 240)">
    <circle r="70" fill="#7f6fd1"/>
    <path d="M-28 20 V-20 C-28 -30 -14 -30 -14 -20 V4 V-36 C-14 -48 2 -48 2 -36 V2 V-30 C2 -42 18 -42 18 -30 V8 V-12 C18 -24 34 -24 34 -12 V24 C34 54 -22 58 -38 28 C-44 17 -38 8 -28 20Z" fill="#fff"/>
  </g>

  <text x="450" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#315f7d">Five</text>
  <text x="450" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#315f7d">Senses</text>
</svg>