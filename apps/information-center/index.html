<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#005f73" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IC Handbook" />
  <title>Information Center Handbook</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="hub-button" href="../../index.html">← MBA Hub</a>

  <header class="header">
    <div class="header-badge">Monterey Bay Aquarium</div>
    <h1>Information Center<br>Handbook</h1>
    <p>Version 2.0 · Updated May 2026 · 18 Sections</p>
  </header>
  <div class="wave"></div>

  <main>
    <section class="tools-panel" aria-label="Handbook tools">
      <label class="search-label" for="searchInput">Search handbook</label>
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="Search wheelchair, radio, lost child…" autocomplete="off" />
        <button id="clearSearchBtn" type="button">Clear</button>
      </div>
      <div class="quick-actions" aria-label="Quick navigation">
        <button type="button" data-jump="0">🚨 Emergency</button>
        <button type="button" data-jump="0">📞 Phone Numbers</button>
        <button type="button" data-jump="7">📻 Radio</button>
        <button type="button" data-jump="11">👧 Lost Child</button>
        <button type="button" data-jump="14">♿ Wheelchairs</button>
        <button type="button" data-jump="12">🗺 Directions</button>
        <button type="button" data-jump="15">🎉 Celebrations</button>
      </div>
      <div class="controls">
        <button class="toggle-all-btn" id="toggleAllBtn" type="button">Expand All</button>
      </div>
    </section>

    <section class="sections" id="sectionsContainer" aria-label="Information Center sections"></section>
  </main>

  <footer class="footer">
    <strong>Information Center Handbook</strong><br />
    Version 2.0 · Updated May 2026<br />
    Interpretive Programs · geinterpretiveprograms@mbayaq.org<br />
    Volunteer Hotline · (831) 648-4867
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
