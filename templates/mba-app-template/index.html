<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#005f73" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="MBA App" />
  <title>MBA App Template</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="return-bar">
    <a href="../../index.html" class="return-link">← MBA Hub</a>
  </div>

  <header class="hero">
    <p id="appCategory" class="eyebrow"></p>
    <h1 id="appTitle">MBA App Template</h1>
    <p id="appSummary"></p>
  </header>

  <main class="shell">
    <section id="imageSection" class="image-section"></section>

    <section class="panel">
      <h2>Quick Facts</h2>
      <ul id="quickFacts"></ul>
    </section>

    <section class="panel kids-panel">
      <h2>Short Fun Kids Fact</h2>
      <p id="kidsFact"></p>
    </section>

    <section class="panel story-panel">
      <h2>Story</h2>
      <p id="story"></p>
    </section>

    <section class="panel">
      <h2>Main Content</h2>
      <div id="mainContent"></div>
    </section>

    <section class="panel">
      <h2>Visitor Questions</h2>
      <div id="visitorQuestions"></div>
    </section>

    <section class="panel guide-panel">
      <h2>Guide Notes</h2>
      <ul id="guideNotes"></ul>
    </section>

    <section class="panel">
      <h2>Tags</h2>
      <div id="tagList" class="tags"></div>
    </section>

    <section class="panel">
      <h2>Related Items</h2>
      <div id="relatedItems" class="related-items"></div>
    </section>
  </main>

  <footer class="footer">
    <span id="versionLine"></span>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
